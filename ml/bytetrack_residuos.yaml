# Config ByteTrack ajustada para esteira de cooperativa.
# Princípios:
# - Objetos sao mais lentos que em videos esportivos.
# - Detecções podem flickar quando confiança cai.
# - Preferimos MANTER ID errado por mais tempo do que criar ID novo.
#   (Erro de ID duplicado é tratado por dedup IOU em turno.py.)

tracker_type: bytetrack
track_high_thresh: 0.25   # bem permissivo: tracker ve quase tudo
track_low_thresh: 0.10
new_track_thresh: 0.75    # ALTO: só abre track novo se confianca alta
                          # (evita criar IDs novos por flicker de baixa confianca)
track_buffer: 150         # 15s sem detectar antes de descartar track
match_thresh: 0.80
fuse_score: True
